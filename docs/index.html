<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conference Tracker</title>
<style>
  :root { --bg:#fff; --fg:#1b1f24; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         color:var(--fg); background:var(--bg); }
  .wrap { max-width:1100px; margin:0 auto; padding:18px 16px 48px; }
  h1 { font-size:20px; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:13px; margin-bottom:14px; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  #q { flex:1 1 220px; min-width:180px; padding:8px 10px; border:1px solid var(--line);
       border-radius:8px; font-size:14px; }
  .filters { display:flex; gap:6px; flex-wrap:wrap; }
  .filters button { padding:7px 11px; border:1px solid var(--line); background:#f9fafb;
       border-radius:999px; cursor:pointer; font-size:13px; color:var(--fg); }
  .filters button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line);
       vertical-align:top; }
  th { cursor:pointer; user-select:none; white-space:nowrap; font-size:12px;
       text-transform:uppercase; letter-spacing:.03em; color:var(--muted); }
  th.sorted::after { content:" \25B4"; }
  th.sorted.desc::after { content:" \25BE"; }
  td a { color:var(--accent); text-decoration:none; }
  td a:hover { text-decoration:underline; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:12px;
       font-weight:600; white-space:nowrap; }
  .b-Submission { background:#dcfce7; color:#166534; }
  .b-Participation { background:#fef3c7; color:#92400e; }
  .b-Ended { background:#f1f5f9; color:#64748b; }
  .b-Unknown { background:#f3f4f6; color:#6b7280; }
  .nowrap { white-space:nowrap; }
  .muted { color:var(--muted); }
  .count { color:var(--muted); font-size:13px; margin:0 0 8px; }
  .empty { padding:24px; text-align:center; color:var(--muted); }
  @media (max-width:640px){ th:nth-child(2), td:nth-child(2){ display:none; } }
</style>
</head>
<body>
<div class="wrap">
  <h1>Conference Tracker</h1>
  <div class="sub">Updated daily &middot; last built 2026-06-07 20:25 UTC</div>
  <div class="controls">
    <input id="q" type="search" placeholder="Search name or location…" aria-label="Search">
    <div class="filters" id="filters">
      <button data-f="all" class="active">All</button>
      <button data-f="Submission">Submission</button>
      <button data-f="Participation">Participation</button>
    </div>
  </div>
  <p class="count" id="count"></p>
  <table>
    <thead><tr>
      <th data-k="name">Conference</th>
      <th data-k="location">Location</th>
      <th data-k="submission_deadline">Submission deadline</th>
      <th data-k="status">Status</th>
      <th data-k="start_date">Start</th>
      <th data-k="end_date">End</th>
      <th data-k="contact">Link</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="empty" id="empty" hidden>No conferences match your search.</div>
</div>

qzVEfyT8w@mail.gmail.com>"}, {"name": "EUROFIDAI-ESSEC Paris December Finance Meeting", "contact": "https://www.paris-december.eu", "location": "Paris, France", "submission_deadline": "2026-05-31", "status": "Participation", "start_date": "2026-12-17", "end_date": "2026-12-17", "last_updated": "2026-06-07T02:03:01Z", "source": "email:<CAAmusDJm4Bhj8SOuYzs6e8XLQ33-LVGMRq4gav183qzVEfyT8w@mail.gmail.com>"}, {"name": "Chicago Fed/University of Chicago Conference on Municipal Bond Markets", "contact": "chi.muni.finance@chi.frb.org", "location": "Chicago, IL", "submission_deadline": "2026-06-01", "status": "Participation", "start_date": "2026-09-29", "end_date": "2026-09-30", "last_updated": "2026-06-07T02:03:01Z", "source": "email:<CAAmusDJm4Bhj8SOuYzs6e8XLQ33-LVGMRq4gav183qzVEfyT8w@mail.gmail.com>"}, {"name": "Finance at a Time of Change and Uncertainty \", \"Submission_Deadline\": \" -08-09\", \"Start_Date\": \" -12-11\", \"End_Date\": \" -12-12\", \"Url\": \"HTTPS://Editorialexpress.Com/Conference/JCFCCHINA2026\", \"Location\": \"Beijing, China\"}, {\"Name\": \"MIT GCFP Annual Conference | \\\"Financial Regulation in an Era of Innovation and Disruption\\\"\", \"Submission_Deadline\": \" -07-17\", \"Start_Date\": \" -10-29\", \"End_Date\": \" -10-30\", \"Url\": \"HTTPS://GCFP.MIT.Edu\", \"Location\": \"Cambridge, Ma\"}, {\"Name\": \"EUROFIDAI-ESSEC Paris December Finance Meeting\", \"Submission_Deadline\": \" -05-31\", \"Start_Date\": \" -12-17\", \"End_Date\": \" -12-17\", \"Url\": \"HTTPS://WWW.Paris-December.EU\", \"Location\": \"Paris, France\"}, {\"Name\": \"Chicago Fed/University of Chicago Conference on Municipal Bond Markets\", \"Submission_Deadline\": \" -06-01\", \"Start_Date\": \" -09-29\", \"End_Date\": \" -09-30\", \"Submission_Email\": \"Chi.Muni.Finance@Chi.FRB.Org\", \"Location\": \"Chicago, Il\"}, {\"Name\": \"SFS Cavalcade Asia-Pacific\", \"Submission_Deadline\": \" -06-30\", \"Start_Date\": \" -12-07\", \"End_Date\": \" -12-09\", \"Url\": \"HTTPS://WWW.Conftool.Com/SFS-Cavalcade-Asia-Pacific \", \"Location\": \"Hong Kong, China\"}, {\"Name\": \"Climate Finance & Policy\", \"Submission_Deadline\": \" -07-31\", \"Start_Date\": \" -10-08\", \"End_Date\": \" -10-09\", \"Url\": \"HTTPS://CFP2026.Sciencesconf.Org/Submission/Submit\", \"Location\": \"Bari, Italy\"}, {\"Name\": \"Australasian Finance and Banking Conference\", \"Submission_Deadline\": \" -08-10\", \"Start_Date\": \" -12-10\", \"End_Date\": \" -12-12\", \"Url\": \"HTTPS://WWW.Unsw.Edu.Au/Business/Our-Schools/Banking-Finance/Seminars-Workshops/Australasian-Finance-Banking-Conference\", \"Location\": \"Sydney, Australia\"}, {\"Name\": \"Financial Economics Meeting\", \"Submission_Deadline\": \" -09-30\", \"Start_Date\": \" -12-14\", \"End_Date\": \" -12-16\", \"Url\": \"HTTPS://FEM2026.Sciencesconf.Org/\", \"Location\": \"Paris, France\"}, {\"Name\": \"ABFER-JFDS Conference on AI for Finance\", \"Submission_Deadline\": \" -06-30\", \"Start_Date\": \" -08-18\", \"End_Date\": \" -08-19\", \"Submission_Email\": \"AI4F@Ustc.Edu.CN\", \"Location\": \"Hefei, China\"}, {\"Name\": \"International Conference in Banking and Financial Studies\", \"Submission_Deadline\": \" -06-30\", \"Start_Date\": \" -09-10\", \"End_Date\": \" -09-11\", \"Url\": \"HTTPS://ICBFS2026.Sciencesconf.Org/\", \"Location\": \"Parma, Italy\"}, {\"Name\": \"CUHK-RAPS-RCFS Conference on Asset Pricing and Corporate Finance\", \"Submission_Deadline\": \" -08-15\", \"Start_Date\": \" -12-13\", \"End_Date\": \" -12-15\", \"Location\": \"Hong Kong, China\"}]}```", "contact": "", "location": "", "submission_deadline": "", "status": "Unknown", "start_date": "", "end_date": "", "last_updated": "2026-06-07T20:25:15Z", "source": "email:<CAAmusDJm4Bhj8SOuYzs6e8XLQ33-LVGMRq4gav183qzVEfyT8w@mail.gmail.com>"}];
let filter = "all", query = "", sortKey = null, sortDir = 1;

function isUrl(s){ return /^https?:\/\//i.test(s || ""); }
function isEmail(s){ return /@/.test(s || "") && !isUrl(s); }

function linkCell(td, contact){
  if (isUrl(contact)) { const a=document.createElement("a"); a.href=contact; a.target="_blank";
    a.rel="noopener"; a.textContent="Website ↗"; td.appendChild(a); }
  else if (isEmail(contact)) { const a=document.createElement("a"); a.href="mailto:"+contact;
    a.textContent=contact; td.appendChild(a); }
  else { td.textContent = contact || "—"; }
}

function nameCell(td, row){
  if (isUrl(row.contact)) { const a=document.createElement("a"); a.href=row.contact;
    a.target="_blank"; a.rel="noopener"; a.textContent=row.name; td.appendChild(a); }
  else { td.textContent = row.name; }
}

function render(){
  const tbody = document.getElementById("rows");
  tbody.textContent = "";
  let rows = DATA.filter(r => {
    if (filter !== "all" && r.status !== filter) return false;
    if (query) { const h=(r.name+" "+r.location).toLowerCase();
      if (!h.includes(query)) return false; }
    return true;
  });
  if (sortKey){
    rows = rows.slice().sort((a,b)=>{
      const x=(a[sortKey]||"").toLowerCase(), y=(b[sortKey]||"").toLowerCase();
      return x<y? -sortDir : x>y? sortDir : 0;
    });
  }
  for (const r of rows){
    const tr=document.createElement("tr");
    const c1=document.createElement("td"); nameCell(c1,r); tr.appendChild(c1);
    const c2=document.createElement("td"); c2.textContent=r.location||"—"; tr.appendChild(c2);
    const c3=document.createElement("td"); c3.className="nowrap";
      c3.textContent=r.submission_deadline||"—"; tr.appendChild(c3);
    const c4=document.createElement("td"); const b=document.createElement("span");
      b.className="badge b-"+(r.status||"Unknown"); b.textContent=r.status||"Unknown";
      c4.appendChild(b); tr.appendChild(c4);
    const c5=document.createElement("td"); c5.className="nowrap";
      c5.textContent=r.start_date||"—"; tr.appendChild(c5);
    const c6=document.createElement("td"); c6.className="nowrap";
      c6.textContent=r.end_date||"—"; tr.appendChild(c6);
    const c7=document.createElement("td"); linkCell(c7,r.contact); tr.appendChild(c7);
    tbody.appendChild(tr);
  }
  document.getElementById("empty").hidden = rows.length>0;
  document.getElementById("count").textContent =
    rows.length + " conference" + (rows.length===1?"":"s");
}

document.getElementById("q").addEventListener("input", e=>{
  query=e.target.value.trim().toLowerCase(); render(); });
document.getElementById("filters").addEventListener("click", e=>{
  if (e.target.tagName!=="BUTTON") return;
  filter=e.target.dataset.f;
  for (const b of e.target.parentNode.children) b.classList.toggle("active", b===e.target);
  render();
});
document.querySelectorAll("th").forEach(th=>th.addEventListener("click", ()=>{
  const k=th.dataset.k;
  sortDir = (sortKey===k) ? -sortDir : 1; sortKey=k;
  document.querySelectorAll("th").forEach(h=>h.classList.remove("sorted","desc"));
  th.classList.add("sorted"); if (sortDir<0) th.classList.add("desc");
  render();
}));
render();
</script>
</body>
</html>
